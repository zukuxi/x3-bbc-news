name: Auto Update BBC FullText

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch:      

jobs:
  update-rss:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install trafilatura

      - name: Fetch RSS and Full Text
        run: python fetch_rss.py

      - name: Commit and push if changed
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git add bbc_world.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-inject BBC full text" && git push)

